<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form </title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div class="container">
        <h2>Sign up Form</h2>
        <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Deserunt similique illo exercitationem, veniam dignissimos tempora placeat molestiae neque doloremque unde sapiente assumenda consequuntur corporis quas accusamus quia quisquam totam aperiam?</p>
        <form action="" method="get">
            <div class="row">
            <label for="first_name"> First Name: </label>
            <input type="text" id="first_name" placeholder="Muhammad">

            <label for="email"> Email: </label>
            <input type="email" id="email" placeholder="example@gmail.com">

            <label for="password"> Password: </label>
            <input type="password" id="password" placeholder="******">


        </div>

            <div class="row2">
            <label for="last_name"> Last Name: </label>
            <input type="text" id="last_name" placeholder="Suhaib">

            <label for="phone"> Phone Number: </label>
            <input type="number" id="phone" placeholder="03221900825">

            <label for="confirm_password"> Confirm Password: </label>
            <input type="password" id="confirm_password" placeholder="******">
            </div>
        </form>
    </div>

    
</body>
</html>
