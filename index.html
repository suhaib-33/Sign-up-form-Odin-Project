<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form </title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div class="img">
        <img src="rain.jpg" alt="" id="#img">

        <div class="grey">
                <img src="grey.webp" alt="">
        </div>
    </div>

    <div class="container">
        <h2>Sign up Form</h2>
        <p> Welcome to our sign up form! Please fill in the details below to create an account. </p>
        <form action="" method="get">
            <div class="row">
            <label for="first_name"> First Name: </label>
            <input type="text" id="first_name" placeholder="Muhammad" required>

            <label for="email"> Email: </label>
            <input type="email" id="email" placeholder="example@gmail.com" required>

            <label for="password"> Password: </label>
            <input type="password" id="password" placeholder="******" required>


        </div>

            <div class="row2">
            <label for="last_name"> Last Name: </label>
            <input type="text" id="last_name" placeholder="Suhaib" required>

            <label for="phone"> Phone Number: </label>
            <input type="number" id="phone" placeholder="03221900825" required>

            <label for="confirm_password"> Confirm Password: </label>
            <input type="password" id="confirm_password" placeholder="******" required>
            </div>

            
        </form>
        <button type="submit"> Create an account</button>
        <p class="txt"> Already have an account? <a href="#"> login</a></p>
    </div>

    
</body>
</html>
