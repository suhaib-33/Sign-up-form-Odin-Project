<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form </title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div class="img">
        <img src="images/rain.jpg" alt="" id="img">

        <div class="grey">
                <img src="images/bg.jpg" alt="">
        </div>

        <div class="odin">
            <img src="images/odin_project.png" alt="">
        </div>
    </div>

    <div class="container">
        <h2>Sign up Form</h2>
        <p> Welcome to our sign up form! Please fill in the details below to create an account. </p>
        <form action="" method="post">
            <div class="row">
            <label for="first_name"> First Name: </label>
            <input type="text" id="first_name" name="first_name"  placeholder="Muhammad" minlength="3" maxlength="20"required>

            <label for="email"> Email: </label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" minlength="3" maxlength="30" required>

            <label for="password"> Password: </label>
            <input type="password" id="password" name="password" placeholder="******" minlength="6" maxlength="20" required>


        </div>

            <div class="row2">
            <label for="last_name"> Last Name: </label>
            <input type="text" id="last_name" name="last_name" placeholder="Suhaib" minlength="3" maxlength="20" required>

            <label for="phone"> Phone Number: </label>
            <input type="number" id="phone" name="phone" placeholder="03221900825" minlength="10" maxlength="15" required>

            <label for="confirm_password"> Confirm Password: </label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="******" minlength="6" maxlength="20" required>
            </div>

        <button type="submit" > Create an account</button>            
        <p class="txt"> Already have an account? <a href="#"> login</a></p>
    </form>

            </div>

    
</body>
</html>
